<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Great Genesis Pro</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<!-- ADMIN PIN OVERLAY -->
<div id="adminPinOverlay" class="lock" style="display:none">
    <div class="card">
      <h1>Admin PIN Required</h1>
      <div class="summary">Enter the 8-digit admin PIN to access the Admin Panel.</div>

      <input id="adminPinInput" maxlength="8" 
            style="margin-top:12px;text-align:center;font-size:22px;letter-spacing:4px" 
            placeholder="--------" />

      <button id="adminPinSubmit" class="btn btn-primary" style="margin-top:12px">Unlock Admin</button>

      <div id="adminPinMsg" class="lock-status" style="margin-top:10px"></div>
    </div>
  </div>

<!-- APP -->
<div class="container">
  <div class="panel">
    <h1>Great Genesis Pro</h1>
    <button id="openAdmin" 
            class="btn btn-ghost" 
            style="float:right;margin-top:-30px;width:80px;color:#ff4d4d;font-weight:700">
      ADMIN
    </button>
    <button id="logoutBtn" 
            class="btn btn-ghost" 
            style="float:right;margin-top:-30px;margin-right:30px;width:80px;color:#888;font-weight:700">
      LOGOUT
    </button>
    <div class="summary">Status: <b id="timerStatus">Inactive</b></div>
  </div>
  

  <div id="app" class="panel" style="display:show">
    <div class="row">
      <div><label>Side A Label</label><input id="labelA" value="Player"/></div>
      <div><label>Side B Label</label><input id="labelB" value="Banker"/></div>
      <div>
        <label>Start Side</label>
        <select id="startSide"><option value="a" selected>A</option><option value="b">B</option></select>
      </div>
    </div>

    <div class="row">
      <div><label>Base Bet</label><input id="baseBet" type="number" value="100"/></div>
      <div><label>Round-off Step</label><input id="roundStep" type="number" value="50"/></div>
      <div><label>Capital</label><input id="capital" type="number" value="50000"/></div>
    </div>

    <div class="row">
      <div><label>Lose Multiplier</label><input id="multiplier" type="number" step="0.1" value="2.5"/></div>
      <div><label>Target Rounds</label><input id="targetRounds" type="number" value="100"/></div>
      <div>
        <label>Engine</label>
        <div class="row" style="gap:6px">
          <button id="startBtn" class="btn btn-primary">START</button>
          <button id="stopBtn" class="btn btn-danger">STOP</button>
        </div>
      </div>
    </div>

    <div class="row">
      <button id="markWin"  class="btn btn-ghost">Mark WIN</button>
      <button id="markLose" class="btn btn-ghost">Mark LOSE</button>
      <button id="markTie"  class="btn btn-ghost">Mark TIE/DRAW</button>
    </div>

    <div class="row" style="margin-top:8px">
      <button id="assistCopy"  class="btn btn-ghost">Copy Next Bet</button>
      <button id="assistSpeak" class="btn btn-ghost">Speak Next Bet</button>
    </div>

    <div class="panel" style="margin-top:10px">
      <div id="status" class="summary">
        Ready — press START, I’ll suggest next bet & side, then you mark WIN/LOSE/TIE.
      </div>
      <div id="log" class="log"></div>
    </div>

    <div id="analytics" class="panel" style="margin-top:10px">
      <h3 style="color:var(--accent);margin:0 0 6px">Analytics</h3>
      <div id="analyticsContent" class="summary">No data yet.</div>
    </div>
</div>
<script src="admin_login.js"></script>

<!-- Route Protection: Check authentication on page load -->
<script>
/* ============================
   ROUTE PROTECTION
   Validates session before showing content
============================ */
(async function() {
  const sessionId = localStorage.getItem('userSessionId');
  
  if (!sessionId) {
    // No session - redirect to login
    window.location.href = '/';
    return;
  }
  
  try {
    const res = await fetch('/api/auth/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId })
    });
    
    const data = await res.json();
    
    if (!data.valid) {
      // Invalid session - redirect to login
      localStorage.removeItem('userSessionId');
      window.location.href = '/';
      return;
    }
    
    // Session valid - show content (remove login overlay if any)
    console.log('User authenticated');
    
    // Add logout button functionality
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
      } catch (e) {
        // Ignore errors on logout
      }
      localStorage.removeItem('userSessionId');
      window.location.href = '/';
    });
    
  } catch (err) {
    console.error('Auth check failed:', err);
    // On error, redirect to login
    window.location.href = '/';
  }
})();
</script>



<script>
/* ============================
   ELEMENTS
============================ */
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const markWinBtn = document.getElementById('markWin');
const markLoseBtn = document.getElementById('markLose');
const markTieBtn = document.getElementById('markTie');

const labelAEl = document.getElementById('labelA');
const labelBEl = document.getElementById('labelB');
const baseBetEl = document.getElementById('baseBet');
const roundStepEl = document.getElementById('roundStep');
const capitalEl = document.getElementById('capital');
const multiplierEl = document.getElementById('multiplier');
const targetRoundsEl = document.getElementById('targetRounds');
const startSideEl = document.getElementById('startSide');

const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
const analyticsEl = document.getElementById('analyticsContent');
const timerStatusEl = document.getElementById('timerStatus');

/* ============================
   UI UPDATE
============================ */
function updateUI(data) {
  statusEl.innerHTML = `
    <b>Next:</b> ${data.next} |
    <b>Bet:</b> ${data.bet} |
    <b>Capital:</b> ${data.capital} |
    <b>Round:</b> ${data.roundsDone}
  `;

  analyticsEl.innerHTML = `
    Wins: ${data.wins} |
    Losses: ${data.losses} |
    Profit: ${data.profit}
  `;

  timerStatusEl.innerText = data.active ? "Active" : "Inactive";
  
  if (data.message) {
    const time = new Date().toLocaleTimeString();
    logEl.textContent += `[${time}] ${data.message}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }
}

/* ============================
   API CALL HELPER
============================ */
async function callEngine(endpoint, body = null) {
  try {
    const res = await fetch(`/api/engine/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : '{}'
    });

    if (!res.ok) {
      throw new Error(`Server error: ${res.status} ${res.statusText}`);
    }
    
    const data = await res.json();
    updateUI(data);
  } catch (err) {
    statusEl.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
    console.error('Engine call failed:', err);
  }
}

/* ============================
   BUTTON EVENTS
============================ */

startBtn.onclick = async () => {
  await callEngine("start", {
    labelA: labelAEl.value,
    labelB: labelBEl.value,
    baseBet: Number(baseBetEl.value),
    roundStep: Number(roundStepEl.value),
    capital: Number(capitalEl.value),
    multiplier: Number(multiplierEl.value),
    targetRounds: Number(targetRoundsEl.value),
    startSide: startSideEl.value
  });
};

stopBtn.onclick = async () => {
  await callEngine("stop");
};

markWinBtn.onclick = async () => {
  await callEngine("win");
};

markLoseBtn.onclick = async () => {
  await callEngine("lose");
};

markTieBtn.onclick = async () => {
  await callEngine("tie");
};

/* ============================
   ASSIST BUTTONS
============================ */
const assistCopyBtn = document.getElementById('assistCopy');
const assistSpeakBtn = document.getElementById('assistSpeak');

// Copy Next Bet to Clipboard
assistCopyBtn.onclick = async () => {
  try {
    // Get current engine state by calling a status endpoint or use last known state
    const res = await fetch('/api/engine/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    
    let textToCopy;
    if (res.ok) {
      const data = await res.json();
      textToCopy = `Next: ${data.next || 'N/A'}, Bet: ${data.bet || 'N/A'}`;
    } else {
      // Fallback: copy current status text
      textToCopy = statusEl.innerText;
    }
    
    await navigator.clipboard.writeText(textToCopy);
    statusEl.innerHTML = `<span style="color:#7dff8a">✓ Copied to clipboard: ${textToCopy}</span>`;
    
    const time = new Date().toLocaleTimeString();
    logEl.textContent += `[${time}] Copied: ${textToCopy}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  } catch (err) {
    console.error('Copy failed:', err);
    statusEl.innerHTML = `<span style="color:red">Copy failed: ${err.message}</span>`;
  }
};

// Speak Next Bet using Web Speech API
assistSpeakBtn.onclick = async () => {
  try {
    if (!('speechSynthesis' in window)) {
      statusEl.innerHTML = `<span style="color:red">Speech not supported in this browser</span>`;
      return;
    }
    
    // Get current engine state
    const res = await fetch('/api/engine/status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    
    let textToSpeak;
    if (res.ok) {
      const data = await res.json();
      textToSpeak = `Next bet is ${data.next || 'unknown'}, bet amount ${data.bet || 'unknown'}`;
    } else {
      // Fallback: speak status text
      textToSpeak = statusEl.innerText.replace(/<[^>]*>/g, ''); // Remove HTML tags
    }
    
    // Cancel any ongoing speech
    window.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(textToSpeak);
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.lang = 'en-US';
    
    utterance.onstart = () => {
      statusEl.innerHTML = `<span style="color:var(--accent)">🔊 Speaking: ${textToSpeak}</span>`;
    };
    
    utterance.onend = () => {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] Spoke: ${textToSpeak}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    };
    
    utterance.onerror = (err) => {
      console.error('Speech error:', err);
      statusEl.innerHTML = `<span style="color:red">Speech error: ${err.error}</span>`;
    };
    
    window.speechSynthesis.speak(utterance);
  } catch (err) {
    console.error('Speak failed:', err);
    statusEl.innerHTML = `<span style="color:red">Speak failed: ${err.message}</span>`;
  }
};

</script>
</body>
</html>
