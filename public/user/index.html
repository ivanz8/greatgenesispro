<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Great Genesis Pro</title>
<link rel="stylesheet" href="/public/assets/style.css">
</head>
<body>
<!-- ADMIN PIN OVERLAY -->
<div id="adminPinOverlay" class="lock" style="display:none">
    <div class="card">
      <h1>Admin PIN Required</h1>
      <div class="summary">Enter the 8-digit admin PIN to access the Admin Panel.</div>

      <input id="adminPinInput" maxlength="8" 
            style="margin-top:12px;text-align:center;font-size:22px;letter-spacing:4px" 
            placeholder="--------" />

      <button id="adminPinSubmit" class="btn btn-primary" style="margin-top:12px">Unlock Admin</button>

      <div id="adminPinMsg" class="lock-status" style="margin-top:10px"></div>
    </div>
  </div>

<!-- APP -->
<div class="container">
  <div class="panel">
    <h1>Genesis 777 Corporation</h1>
    <button id="openAdmin" 
            class="btn btn-ghost" 
            style="float:right;margin-top:-30px;width:100px;color:#ff4d4d;font-weight:700">
      ADMIN
    </button>
    <div class="summary">Status: <b id="timerStatus">Inactive</b></div>
  </div>
  

  <div id="app" class="panel" style="display:show">
    <div class="row">
      <div><label>Side A Label</label><input id="labelA" value="Player"/></div>
      <div><label>Side B Label</label><input id="labelB" value="Banker"/></div>
      <div>
        <label>Start Side</label>
        <select id="startSide"><option value="a" selected>A</option><option value="b">B</option></select>
      </div>
    </div>

    <div class="row">
      <div><label>Base Bet</label><input id="baseBet" type="number" value="100"/></div>
      <div><label>Round-off Step</label><input id="roundStep" type="number" value="50"/></div>
      <div><label>Capital</label><input id="capital" type="number" value="50000"/></div>
    </div>

    <div class="row">
      <div><label>Lose Multiplier</label><input id="multiplier" type="number" step="0.1" value="2.5"/></div>
      <div><label>Target Rounds</label><input id="targetRounds" type="number" value="100"/></div>
      <div>
        <label>Engine</label>
        <div class="row" style="gap:6px">
          <button id="startBtn" class="btn btn-primary">START</button>
          <button id="stopBtn" class="btn btn-danger">STOP</button>
        </div>
      </div>
    </div>

    <div class="row">
      <button id="markWin"  class="btn btn-ghost">Mark WIN</button>
      <button id="markLose" class="btn btn-ghost">Mark LOSE</button>
      <button id="markTie"  class="btn btn-ghost">Mark TIE/DRAW</button>
    </div>

    <div class="row" style="margin-top:8px">
      <button id="assistCopy"  class="btn btn-ghost">Copy Next Bet</button>
      <button id="assistSpeak" class="btn btn-ghost">Speak Next Bet</button>
    </div>

    <div class="panel" style="margin-top:10px">
      <div id="status" class="summary">
        Ready — press START, I’ll suggest next bet & side, then you mark WIN/LOSE/TIE.
      </div>
      <div id="log" class="log"></div>
    </div>

    <div id="analytics" class="panel" style="margin-top:10px">
      <h3 style="color:var(--accent);margin:0 0 6px">Analytics</h3>
      <div id="analyticsContent" class="summary">No data yet.</div>
    </div>
</div>
<script src="admin_login.js"></script>



<script>
/* ============================
   ELEMENTS
============================ */
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const markWinBtn = document.getElementById('markWin');
const markLoseBtn = document.getElementById('markLose');
const markTieBtn = document.getElementById('markTie');

const labelAEl = document.getElementById('labelA');
const labelBEl = document.getElementById('labelB');
const baseBetEl = document.getElementById('baseBet');
const roundStepEl = document.getElementById('roundStep');
const capitalEl = document.getElementById('capital');
const multiplierEl = document.getElementById('multiplier');
const targetRoundsEl = document.getElementById('targetRounds');
const startSideEl = document.getElementById('startSide');

const statusEl = document.getElementById('status');
const analyticsEl = document.getElementById('analyticsContent');
const timerStatusEl = document.getElementById('timerStatus');

/* ============================
   UI UPDATE
============================ */
function updateUI(data) {
  statusEl.innerHTML = `
    <b>Next:</b> ${data.next} |
    <b>Bet:</b> ${data.bet} |
    <b>Capital:</b> ${data.capital} |
    <b>Round:</b> ${data.roundsDone}
  `;

  analyticsEl.innerHTML = `
    Wins: ${data.wins} |
    Losses: ${data.losses} |
    Profit: ${data.profit}
  `;

  timerStatusEl.innerText = data.active ? "Active" : "Inactive";
}

/* ============================
   API CALL HELPER
============================ */
async function callEngine(endpoint, body = null) {
  const res = await fetch(`/engine/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : null
  });

  const data = await res.json();
  updateUI(data);
}

/* ============================
   BUTTON EVENTS
============================ */

startBtn.onclick = async () => {
  await callEngine("start", {
    labelA: labelAEl.value,
    labelB: labelBEl.value,
    baseBet: Number(baseBetEl.value),
    roundStep: Number(roundStepEl.value),
    capital: Number(capitalEl.value),
    multiplier: Number(multiplierEl.value),
    targetRounds: Number(targetRoundsEl.value),
    startSide: startSideEl.value
  });
};

stopBtn.onclick = async () => {
  await callEngine("stop");
};

markWinBtn.onclick = async () => {
  await callEngine("win");
};

markLoseBtn.onclick = async () => {
  await callEngine("lose");
};

markTieBtn.onclick = async () => {
  await callEngine("tie");
};

</script>
</script>
</body>
</html>
